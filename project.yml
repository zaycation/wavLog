name: WavLog

options:
  bundleIdPrefix: com.wavlog
  createIntermediateGroups: true
  xcodeVersion: "16.0"
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.5.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  WavLog:
    type: application
    supportedDestinations:
      - iOS
      - macOS
    deploymentTarget:
      iOS: "17.0"
      macOS: "14.0"
    sources:
      - path: Sources/WavLog
    resources:
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.isaiahthomas.wavlog
        DEVELOPMENT_TEAM: U3F9NUVPW6
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_CFBundleDisplayName: WavLog
        INFOPLIST_KEY_NSMicrophoneUsageDescription: WavLog uses the microphone to record reference audio.
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UIBackgroundModes: audio remote-notification
        CODE_SIGN_ENTITLEMENTS: Sources/WavLog/WavLog.entitlements
    dependencies:
      - package: Supabase
        product: Supabase

  WavLogTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Tests/WavLogTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.isaiahthomas.wavlog.tests
    dependencies:
      - target: WavLog

schemes:
  WavLog:
    build:
      targets:
        WavLog: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - WavLogTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
